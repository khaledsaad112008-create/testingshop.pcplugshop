<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>(function(){try{var t=localStorage.getItem('pc_plug_theme')||'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart — PC PLUG</title>
  <link rel="icon" href="images/logo.png" type="image/png" />
  <link rel="stylesheet" href="css/style.css?v=6" />
</head>
<body>
  <header class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="brand">
        <img src="images/logo.png" alt="PC PLUG logo" />
        <span>PC PLUG</span>
      </a>
      <nav class="nav-links">
        <a href="index.html">Shop</a>
        <div class="nav-dropdown" id="categoryMenu">
          <button type="button" class="nav-dropdown-toggle">Categories ▾</button>
          <div class="nav-dropdown-menu" id="categoryMenuList"></div>
        </div>
        <button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>
        <a href="cart.html" class="cart-link active">
          🛒 Cart <span class="cart-count" id="cartCount">0</span>
        </a>
      </nav>
    </div>
  </header>

  <main class="cart-page">
    <h1>Your Cart</h1>
    <div class="cart-items" id="cartItems"></div>
    <aside class="cart-summary" id="cartSummary"></aside>
  </main>

  <footer class="site-footer">
    &copy; 2026 PC PLUG. All rights reserved.
  </footer>

  <script src="js/products.js?v=7"></script>
  <script src="js/cart.js?v=3"></script>
  <script src="js/theme.js?v=2"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      await loadProducts();
      initCartPage();
      updateCartBadge();
      initThemeToggle();
      initCategoryMenu();
    });
  </script>
</body>
</html>
