<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>(function(){try{var t=localStorage.getItem('pc_plug_theme')||'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PC PLUG — Power &amp; Cable Essentials</title>
  <link rel="icon" href="images/logo.png" type="image/png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="brand">
        <img src="images/logo.png" alt="PC PLUG logo" />
        <span>PC PLUG</span>
      </a>
      <nav class="nav-links">
        <a href="index.html" class="active">Shop</a>
        <button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>
        <a href="cart.html" class="cart-link">
          🛒 Cart <span class="cart-count" id="cartCount">0</span>
        </a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <h1>Power up with PC PLUG</h1>
    <p>Chargers, cables, adapters and smart plugs — everything you need to keep your devices connected and powered.</p>
  </section>

  <div class="filters">
    <input type="search" id="searchInput" placeholder="Search products..." aria-label="Search products" />
    <select id="categorySelect" aria-label="Filter by category"></select>
    <span class="filters-count" id="resultsCount"></span>
  </div>

  <main class="product-grid" id="productGrid"></main>

  <footer class="site-footer">
    &copy; 2026 PC PLUG. All rights reserved.
  </footer>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/theme.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      initHomePage();
      updateCartBadge();
      initThemeToggle();
    });
  </script>
</body>
</html>
